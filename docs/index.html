<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Krummer Hund – Literatur Phase 8</title>
  <style>
    :root { color-scheme: light; font-family: "Segoe UI", Arial, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #262020; background: #f7f1f1; }
    main { width: min(780px, calc(100% - 32px)); padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 18px 45px rgba(60, 25, 30, .14); }
    h1 { margin: 0 0 10px; color: #831522; }
    p { color: #676060; }
    nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-top: 28px; }
    a { display: block; padding: 22px; color: #fff; background: #b51f2e; border-radius: 8px; text-decoration: none; font-weight: 700; }
    a:hover, a:focus-visible { background: #831522; }
    span { display: block; margin-top: 5px; font-size: .9rem; font-weight: 400; opacity: .9; }
  </style>
</head>
<body>
  <main>
    <h1>Krummer Hund</h1>
    <p>Interaktive Materialien für Deutsch – Literatur Phase 8</p>
    <nav aria-label="Material auswählen">
      <a href="./mindeststandard/">Mindeststandard<span>Interaktive Stationen für M8 öffnen</span></a>
      <a href="./regelstandard/">Regelstandard<span>Interaktive Stationen für R8 öffnen</span></a>
    </nav>
  </main>
</body>
</html>
