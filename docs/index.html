<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Krummer Hund – Literatur Phase 8</title>
  <style>
    :root { color-scheme: light; font-family: "Segoe UI", Arial, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #262020; background: #f7f1f1; }
    main { width: min(940px, calc(100% - 32px)); margin: 24px 0; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 18px 45px rgba(60, 25, 30, .14); }
    h1 { margin: 0 0 10px; color: #831522; }
    p { color: #676060; }
    .hero-image { display: block; width: 100%; max-height: 300px; margin: 22px 0 6px; object-fit: contain; border-radius: 10px; background: #fff; }
    .packages { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 18px; margin-top: 28px; }
    .package { padding: 20px; border: 1px solid #ead9dc; border-radius: 12px; background: #fffafa; }
    .package-main { display: grid; grid-template-columns: 112px 1fr; gap: 18px; align-items: center; color: inherit; text-decoration: none; }
    .package-main:hover .package-title, .package-main:focus-visible .package-title { color: #831522; text-decoration: underline; }
    .package-title { display: block; color: #b51f2e; font-size: 1.15rem; font-weight: 700; }
    .package-copy { display: block; margin-top: 5px; color: #676060; font-size: .9rem; font-weight: 400; }
    .dual-ring { --test: 0; --practice: 0; position: relative; width: 108px; aspect-ratio: 1; display: grid; place-items: center; border-radius: 50%; background: conic-gradient(#b51f2e calc(var(--test) * 1%), #e7dfe1 0); }
    .dual-ring::before { content: ""; position: absolute; inset: 9px; border-radius: 50%; background: #fffafa; }
    .practice-ring { position: absolute; inset: 17px; display: grid; place-items: center; border-radius: 50%; background: conic-gradient(#2a8b75 calc(var(--practice) * 1%), #e7dfe1 0); }
    .practice-ring::before { content: ""; position: absolute; inset: 8px; border-radius: 50%; background: #fffafa; }
    .ring-value { position: relative; z-index: 1; color: #3b3233; font-weight: 700; font-variant-numeric: tabular-nums; }
    .legend { display: grid; gap: 5px; margin-top: 11px; color: #676060; font-size: .82rem; }
    .legend span { display: flex; align-items: center; gap: 7px; }
    .legend i { width: 10px; height: 10px; flex: 0 0 auto; border-radius: 50%; background: #b51f2e; }
    .legend .practice-dot { background: #2a8b75; }
    .package-actions { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 18px; padding-top: 15px; border-top: 1px solid #ead9dc; }
    button { min-height: 40px; padding: 8px 16px; border: 1px solid #b51f2e; border-radius: 7px; color: #fff; background: #b51f2e; font: inherit; font-weight: 700; cursor: pointer; }
    button:hover, button:focus-visible { background: #831522; border-color: #831522; }
    button.secondary { color: #831522; background: #fff; }
    button.secondary:hover, button.secondary:focus-visible { color: #fff; background: #831522; }
    .status { min-height: 1.25em; margin: 9px 0 0; color: #676060; font-size: .84rem; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    @media (max-width: 560px) {
      main { padding: 24px 18px; }
      .packages { grid-template-columns: 1fr; }
      .package-main { grid-template-columns: 92px 1fr; gap: 14px; }
      .dual-ring { width: 90px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Krummer Hund</h1>
    <img class="hero-image" src="./assets/img/Daniel_mit_Ozzy-neu.jpg" alt="Aquarellillustration von Daniel und seinem Hund Ozzy">
    <p>Interaktive Materialien für Deutsch – Literatur Phase 8</p>

    <section class="packages" aria-label="Material auswählen">
      <article class="package" data-standard="M8" data-prefix="krummerHundM8">
        <a class="package-main" href="./mindeststandard/">
          <div class="dual-ring" role="img" aria-label="Mindeststandard: Abschlusstest 0 Prozent, Übungen 0 Prozent">
            <div class="practice-ring"><span class="ring-value">0%</span></div>
          </div>
          <div>
            <span class="package-title">Mindeststandard</span>
            <span class="package-copy">Interaktive Stationen für M8 öffnen</span>
            <span class="legend" aria-hidden="true">
              <span><i></i><b class="test-label">Test: 0%</b></span>
              <span><i class="practice-dot"></i><b class="practice-label">Übungen: 0%</b></span>
            </span>
          </div>
        </a>
        <div class="package-actions">
          <button type="button" data-action="export">Export</button>
          <button class="secondary" type="button" data-action="import">Import</button>
          <input class="sr-only" type="file" accept="application/json,.json" data-import-file aria-label="Fortschrittsdatei für den Mindeststandard auswählen">
        </div>
        <p class="status" aria-live="polite"></p>
      </article>

      <article class="package" data-standard="R8" data-prefix="krummerHundR8">
        <a class="package-main" href="./regelstandard/">
          <div class="dual-ring" role="img" aria-label="Regelstandard: Abschlusstest 0 Prozent, Übungen 0 Prozent">
            <div class="practice-ring"><span class="ring-value">0%</span></div>
          </div>
          <div>
            <span class="package-title">Regelstandard</span>
            <span class="package-copy">Interaktive Stationen für R8 öffnen</span>
            <span class="legend" aria-hidden="true">
              <span><i></i><b class="test-label">Test: 0%</b></span>
              <span><i class="practice-dot"></i><b class="practice-label">Übungen: 0%</b></span>
            </span>
          </div>
        </a>
        <div class="package-actions">
          <button type="button" data-action="export">Export</button>
          <button class="secondary" type="button" data-action="import">Import</button>
          <input class="sr-only" type="file" accept="application/json,.json" data-import-file aria-label="Fortschrittsdatei für den Regelstandard auswählen">
        </div>
        <p class="status" aria-live="polite"></p>
      </article>
    </section>
  </main>

  <script>
    const packageNames = { M8: "Mindeststandard", R8: "Regelstandard" };

    function readJson(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function percentFromBooleans(values) {
      const checked = values.filter(value => typeof value === "boolean");
      return checked.length ? Math.round(checked.filter(Boolean).length / checked.length * 100) : 0;
    }

    function packageStats(card) {
      const prefix = card.dataset.prefix;
      const quiz = readJson(prefix + "QuizResults", []);
      const exercises = readJson(prefix + "ExerciseResults", {});
      const practiceValues = Object.values(exercises).flatMap(group =>
        group && typeof group === "object" ? Object.values(group) : []
      );
      return {
        test: percentFromBooleans(Array.isArray(quiz) ? quiz : []),
        practice: percentFromBooleans(practiceValues)
      };
    }

    function renderPackage(card) {
      const stats = packageStats(card);
      const ring = card.querySelector(".dual-ring");
      ring.style.setProperty("--test", stats.test);
      ring.style.setProperty("--practice", stats.practice);
      ring.setAttribute("aria-label", packageNames[card.dataset.standard] + ": Abschlusstest " + stats.test + " Prozent, Übungen " + stats.practice + " Prozent");
      card.querySelector(".ring-value").textContent = stats.test + "%";
      card.querySelector(".test-label").textContent = "Test: " + stats.test + "%";
      card.querySelector(".practice-label").textContent = "Übungen: " + stats.practice + "%";
    }

    function exportProgress(card) {
      const storage = {};
      const prefix = card.dataset.prefix;
      for (let index = 0; index < localStorage.length; index++) {
        const key = localStorage.key(index);
        if (key && key.startsWith(prefix)) storage[key] = localStorage.getItem(key);
      }
      const payload = {
        format: "krummer-hund-progress",
        version: 1,
        standard: card.dataset.standard,
        exportedAt: new Date().toISOString(),
        storage
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "krummer-hund-" + card.dataset.standard.toLowerCase() + "-fortschritt-" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      card.querySelector(".status").textContent = "Fortschritt wurde exportiert.";
    }

    function importProgress(card, file) {
      const reader = new FileReader();
      const status = card.querySelector(".status");
      reader.addEventListener("load", () => {
        try {
          const payload = JSON.parse(String(reader.result || ""));
          if (payload.format !== "krummer-hund-progress" || payload.standard !== card.dataset.standard || !payload.storage || typeof payload.storage !== "object") {
            throw new Error("Diese Datei gehört nicht zum " + packageNames[card.dataset.standard] + ".");
          }
          const prefix = card.dataset.prefix;
          const keysToRemove = [];
          for (let index = 0; index < localStorage.length; index++) {
            const key = localStorage.key(index);
            if (key && key.startsWith(prefix)) keysToRemove.push(key);
          }
          keysToRemove.forEach(key => localStorage.removeItem(key));
          Object.entries(payload.storage).forEach(([key, value]) => {
            if (key.startsWith(prefix) && typeof value === "string") localStorage.setItem(key, value);
          });
          renderPackage(card);
          status.textContent = "Fortschritt wurde importiert.";
        } catch (error) {
          status.textContent = error.message || "Die Datei konnte nicht importiert werden.";
        }
      });
      reader.addEventListener("error", () => {
        status.textContent = "Die Datei konnte nicht gelesen werden.";
      });
      reader.readAsText(file);
    }

    document.querySelectorAll(".package").forEach(card => {
      const fileInput = card.querySelector("[data-import-file]");
      card.querySelector('[data-action="export"]').addEventListener("click", () => exportProgress(card));
      card.querySelector('[data-action="import"]').addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        const file = fileInput.files && fileInput.files[0];
        if (file) importProgress(card, file);
        fileInput.value = "";
      });
      renderPackage(card);
    });

    window.addEventListener("pageshow", () => {
      document.querySelectorAll(".package").forEach(renderPackage);
    });
  </script>
</body>
</html>
